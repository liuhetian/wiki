<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Banana 果冻模型 Demo</title>
<script type="importmap">{"imports":{"three":"/vendor/three/three.module.min.js"}}</script>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#07114a;color:#eef5ff;font-family:ui-monospace,SFMono-Regular,monospace}body{background:radial-gradient(circle at 50% 50%,#17358e,#07114a 58%,#040a32)}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(128,169,255,.14) 1px,transparent 1px),linear-gradient(90deg,rgba(128,169,255,.14) 1px,transparent 1px);background-size:80px 80px}.label{position:fixed;z-index:4;left:18px;top:16px;font-size:10px;letter-spacing:.12em}.hint{position:fixed;z-index:4;right:18px;bottom:16px;font-size:9px;color:#8faadb}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.loading{position:fixed;inset:0;z-index:8;display:grid;place-items:center;background:#07114a;font-size:9px;transition:opacity .35s}.loading.done{opacity:0;pointer-events:none}
</style></head><body><div class="grid"></div><div class="label">BANANA.GLB / JELLY MATERIAL</div><div class="hint">MOVE POINTER · DRAG TO ROTATE</div><div class="loading">LOADING MODEL</div>
<script type="module">
import * as THREE from 'three';import{GLTFLoader}from'/vendor/three/addons/loaders/GLTFLoader.js';
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,premultipliedAlpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0,0);renderer.outputColorSpace=THREE.SRGBColorSpace;document.body.append(renderer.domElement);
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(46,1,.1,100);camera.position.set(0,0,21);const pointer=new THREE.Vector2(),smooth=new THREE.Vector2();let mesh,mat,drag=false,lastX=0,spin=0;
const vs=`varying vec3 n;varying vec3 eye;varying vec3 p;void main(){vec4 w=modelMatrix*vec4(position,1.);n=normalize(mat3(modelMatrix)*normal);eye=normalize(w.xyz-cameraPosition);p=position;gl_Position=projectionMatrix*viewMatrix*w;}`;
const fs=`uniform vec3 light;uniform float time;varying vec3 n;varying vec3 eye;varying vec3 p;void main(){vec3 N=normalize(n),E=normalize(eye);float face=abs(dot(N,E)),rim=pow(1.-face,3.2),wet=pow(max(0.,dot(N,normalize(light))),34.);float glow=.5+.5*sin(p.x*2.+p.y*1.4+time*.5);vec3 body=mix(vec3(.035,.18,.70),vec3(.22,.78,1.),pow(face,1.5)*.58);vec3 c=body+rim*vec3(.28,.62,1.)*.58+rim*vec3(.52,.18,1.)*.15+wet*vec3(.98,1.,1.)*.72+glow*rim*vec3(.03,.2,.7)*.08;gl_FragColor=vec4(c,min(.72+rim*.22+wet*.04,.97));}`;
new GLTFLoader().load('./banana-tube.glb',g=>{let geo;g.scene.updateMatrixWorld(true);g.scene.traverse(o=>{if(!geo&&o.isMesh){geo=o.geometry.clone();geo.applyMatrix4(o.matrixWorld)}});geo.computeBoundingBox();const b=geo.boundingBox,c=b.getCenter(new THREE.Vector3()),s=b.getSize(new THREE.Vector3()),k=12/s.x;geo.translate(-c.x,-c.y,-c.z);geo.scale(k,k,k);geo.computeVertexNormals();mat=new THREE.ShaderMaterial({vertexShader:vs,fragmentShader:fs,transparent:true,depthWrite:false,uniforms:{light:{value:new THREE.Vector3(4,9,.5)},time:{value:0}}});mesh=new THREE.Mesh(geo,mat);scene.add(mesh);document.querySelector('.loading').classList.add('done')});
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
addEventListener('pointermove',e=>{pointer.set(e.clientX/innerWidth*2-1,1-e.clientY/innerHeight*2);if(drag){spin+=(e.clientX-lastX)*.008;lastX=e.clientX}});addEventListener('pointerdown',e=>{drag=true;lastX=e.clientX});addEventListener('pointerup',()=>drag=false);addEventListener('pointercancel',()=>drag=false);
const clock=new THREE.Clock();function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.05);smooth.lerp(pointer,.12);if(mesh){mesh.rotation.y=THREE.MathUtils.damp(mesh.rotation.y,spin+smooth.x*.22,6,dt);mesh.rotation.x=THREE.MathUtils.damp(mesh.rotation.x,-smooth.y*.12,6,dt);mesh.position.y=.16*Math.sin(clock.elapsedTime*1.2);mat.uniforms.light.value.set(smooth.x*6,smooth.y*5+4,.5);mat.uniforms.time.value=clock.elapsedTime}renderer.render(scene,camera)}tick();
</script></body></html>
