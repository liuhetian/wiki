<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Banana Hover 涟漪 Demo</title>
<script type="importmap">{"imports":{"three":"/vendor/three/three.module.min.js"}}</script>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#07114a;color:#eef5ff;font-family:ui-monospace,SFMono-Regular,monospace}body{background:radial-gradient(circle at 50% 52%,#15378f,#07114a 60%,#040a32)}.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(128,169,255,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(128,169,255,.13) 1px,transparent 1px);background-size:80px 80px}.label{position:fixed;z-index:4;left:18px;top:16px;font-size:10px;letter-spacing:.12em}.hint{position:fixed;z-index:4;right:18px;bottom:16px;font-size:9px;color:#8faadb}.dot{position:fixed;z-index:5;width:14px;height:14px;border:2px solid #64c3ff;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 0 18px #64c3ff}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.loading{position:fixed;inset:0;z-index:8;display:grid;place-items:center;background:#07114a;font-size:9px;transition:opacity .35s}.loading.done{opacity:0;pointer-events:none}@media(hover:none){.dot{display:none}}
</style></head><body><div class="grid"></div><div class="label">HOVER RIPPLE / VERTEX DISPLACEMENT</div><div class="hint">SWEEP ACROSS THE MODEL</div><div class="dot"></div><div class="loading">LOADING MODEL</div>
<script type="module">
import * as THREE from'three';import{GLTFLoader}from'/vendor/three/addons/loaders/GLTFLoader.js';
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,premultipliedAlpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0,0);renderer.outputColorSpace=THREE.SRGBColorSpace;document.body.append(renderer.domElement);
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(46,1,.1,100),ray=new THREE.Raycaster(),mouse=new THREE.Vector2(2,2);camera.position.set(0,0,21);let mesh,mat,ripple=0;const hit=new THREE.Vector3(999,999,999),targetHit=new THREE.Vector3(999,999,999),dot=document.querySelector('.dot');
const vs=`uniform vec3 hit;uniform float ripple;uniform float time;varying vec3 n;varying vec3 p;varying float wave;void main(){p=position;n=normalize(normalMatrix*normal);float d=distance(position,hit);wave=sin(d*11.-time*8.)*exp(-d*1.15)*ripple;vec3 moved=position+normal*wave*.34;gl_Position=projectionMatrix*modelViewMatrix*vec4(moved,1.);}`;
const fs=`uniform float ripple;varying vec3 n;varying vec3 p;varying float wave;void main(){vec3 N=normalize(n);float rim=pow(1.-abs(N.z),3.);float band=.5+.5*wave;vec3 base=mix(vec3(.04,.16,.72),vec3(.18,.72,1.),abs(N.z)*.55);vec3 chroma=mix(vec3(.58,.16,1.),vec3(.05,1.,.9),band);vec3 c=base+rim*vec3(.35,.68,1.)*.55+chroma*abs(wave)*.75;gl_FragColor=vec4(c,.78+rim*.18);}`;
new GLTFLoader().load('./banana-tube.glb',g=>{let geo;g.scene.updateMatrixWorld(true);g.scene.traverse(o=>{if(!geo&&o.isMesh){geo=o.geometry.clone();geo.applyMatrix4(o.matrixWorld)}});geo.computeBoundingBox();const b=geo.boundingBox,c=b.getCenter(new THREE.Vector3()),s=b.getSize(new THREE.Vector3()),k=12/s.x;geo.translate(-c.x,-c.y,-c.z);geo.scale(k,k,k);geo.computeVertexNormals();mat=new THREE.ShaderMaterial({vertexShader:vs,fragmentShader:fs,transparent:true,depthWrite:false,uniforms:{hit:{value:hit},ripple:{value:0},time:{value:0}}});mesh=new THREE.Mesh(geo,mat);scene.add(mesh);document.querySelector('.loading').classList.add('done')});
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
addEventListener('pointermove',e=>{mouse.set(e.clientX/innerWidth*2-1,1-e.clientY/innerHeight*2);dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';if(!mesh)return;ray.setFromCamera(mouse,camera);const found=ray.intersectObject(mesh,false)[0];if(found){targetHit.copy(mesh.worldToLocal(found.point.clone()));ripple=1;dot.style.borderColor='#c0fe04'}else dot.style.borderColor='#64c3ff'});
document.documentElement.addEventListener('mouseout',e=>{if(!e.relatedTarget){mouse.set(2,2);ripple=0}});
const clock=new THREE.Clock();function tick(){requestAnimationFrame(tick);const dt=Math.min(clock.getDelta(),.05);hit.lerp(targetHit,.18);ripple=THREE.MathUtils.damp(ripple,0,1.45,dt);if(mesh){mesh.rotation.y=.05*Math.sin(clock.elapsedTime*.45);mesh.position.y=.13*Math.sin(clock.elapsedTime*1.1);mat.uniforms.hit.value.copy(hit);mat.uniforms.ripple.value=ripple;mat.uniforms.time.value=clock.elapsedTime}renderer.render(scene,camera)}tick();
</script></body></html>
