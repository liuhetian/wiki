theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - content.code.annotate

extra_javascript:
  - vendor/mathjax-init.js   # MathJax 配置，须在真身之前
  - vendor/mathjax/tex-svg.js  # 本地化真身（3.2.2，SVG 输出免字体文件），不依赖外网 CDN
  - vendor/echarts-init.js   # ```echarts 代码块渲染器；真身按需动态加载，无图页面零开销

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs   # docs 内引用去掉 docs/ 前缀（如 skills/.../x.md），避免 AI 把 docs/ 当 URL
        - .      # 回退到项目根：mkdocs.yml / deploy.sh 等真实文件仍可被 --8<-- 引用
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: echarts   # 声明式图表：fence 里写 ECharts option JSON，vendor/echarts-init.js 渲染
          class: echarts
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

